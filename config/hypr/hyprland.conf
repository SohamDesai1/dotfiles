# #######################################################################################
# HYPRLAND CONFIG — DEV OPTIMIZED (synthwave)
# #######################################################################################

################
### MONITORS ###
################

monitor = , preferred, auto, auto

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = dolphin
$menu        = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = sleep 1 && waybar
exec-once = copyq
exec-once = hyprpaper
exec-once = hyprsunset

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Sweet-Ambar-Purple-Dark-Custom

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 3
    gaps_out = 5
    border_size = 2

    col.active_border   = rgba(ff00ffaa) rgba(00e5ffaa) 45deg
    col.inactive_border = rgba(2a2a3aaa)
}

decoration {
    rounding        = 10
    active_opacity  = 0.95
    inactive_opacity = 0.85

    blur {
        enabled           = true
        size              = 6
        passes            = 2
        vibrancy          = 0.2
        vibrancy_darkness = 0.2
        new_optimizations = true
        ignore_opacity    = true
        popups            = true
        input_methods     = true
        contrast          = 1
        brightness        = 2
    }

    shadow {
        enabled      = true
        range        = 10
        render_power = 4
        color        = rgba(ff00ff22)
    }
}

animations {
    enabled = yes

    bezier = snappy, 0.25, 1, 0.5, 1

    animation = windows,    1, 3,  snappy, slide
    animation = windowsOut, 1, 2,  snappy, slide
    animation = fade,       1, 3,  snappy
    animation = workspaces, 1, 4,  snappy, slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = true
    vfr                     = true   # saves GPU cycles when idle
}

#############
### INPUT ###
#############

input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod, Q, exec, kitty --title "main-term"
bind = $mainMod SHIFT, RETURN, exec, kitty --title "main-term" -e tmux
bind = $mainMod,       W,      killactive
bind = $mainMod,       M,      exit
bind = $mainMod,       E,      exec,         $fileManager
bind = $mainMod,       SPACE,  exec,         $menu
bind = $mainMod,       L,      exec,         hyprlock
bind = $mainMod,       F,      fullscreen
bind = ALT,            SPACE,  exec,         ~/.config/wofi/scripts/websearch.sh

# Apps
bind = $mainMod, B, exec, brave --password-store=basic --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $mainMod, C, exec, code --ozone-platform-hint=wayland --gtk-version=4 --ignore-gpu-blocklist --enable-features=TouchpadOverscrollHistoryNavigation --enable-wayland-ime --password-store=gnome-libsecret
bind = $mainMod, N, exec, kitty --title "nvim" -e nvim
bind = $mainMod, G, exec, kitty --title "gitui" -e fish -lc "gitui || exec fish"

# Screenshot
bind = SUPER,            Print, exec, hyprshot -m window
bind = SUPER SHIFT,      Print, exec, hyprshot -m monitor
bind = $mainMod SHIFT,   S,     exec, hyprshot -m region

# Window control
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod,       1, workspace,      1
bind = $mainMod,       2, workspace,      2
bind = $mainMod,       3, workspace,      3
bind = $mainMod,       4, workspace,      4
bind = $mainMod,       5, workspace,      5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod,       TAB,   cyclenext
bind = $mainMod SHIFT, TAB,   cyclenext, prev
bind = ALT,            TAB,   workspace, e+1
bind = ALT SHIFT,      TAB,   workspace, e-1
bind = ALT,            C,     exec, copyq toggle

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

##############################
### WORKSPACES (DEV FLOW)  ###
##############################

workspace = 1, name:terminal
workspace = 2, name:code
workspace = 3, name:browser
workspace = 4, name:󰈙 docs
workspace = 5, name:chat

##############################
### WINDOW RULES           ###
##############################


windowrule {
    name        = nvim-workspace
    match:class = ^(kitty)$
    match:title = ^(nvim)$
    workspace   = 2
}

windowrule {
    name        = gitui-workspace
    match:class = ^(kitty)$
    match:title = ^(gitui)$
    workspace   = 2
}

windowrule {
    name        = main-term-workspace
    match:class = ^(kitty)$
    match:title = ^(main-term)$
    workspace   = 1
}

windowrule {
    name        = generic-terminal-workspace
    match:class = ^(kitty)$
    match:title = ^(?!nvim|gitui|main-term).*$
    workspace   = 1
}

windowrule {
    name        = vscode-workspace
    match:class = ^(code)$
    workspace   = 2
}

windowrule {
    name        = browser-workspace
    match:class = ^(Brave-browser|brave-browser|brave)$
    workspace   = 3
}

windowrule {
    name        = chat-workspace
    match:class = ^(discord|telegram-desktop)$
    workspace   = 5
}

windowrule {
    name        = float-apps
    match:class = ^(pavucontrol|blueman-manager)$
    float       = on
}
